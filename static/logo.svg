<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="amber-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7d070"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <linearGradient id="amber-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Targeting reticle around XP -->
  <g transform="translate(24, 24)" filter="url(#glow)">
    <!-- Outer ring segments -->
    <path d="M-18 0 A18 18 0 0 1 -12.73 -12.73" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M12.73 -12.73 A18 18 0 0 1 18 0" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M18 0 A18 18 0 0 1 12.73 12.73" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-12.73 12.73 A18 18 0 0 1 -18 0" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Crosshair ticks -->
    <line x1="-21" y1="0" x2="-16" y2="0" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="0" x2="21" y2="0" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-21" x2="0" y2="-16" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="16" x2="0" y2="21" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Inner diamond -->
    <path d="M0 -7 L7 0 L0 7 L-7 0 Z" stroke="#f0b429" stroke-width="1" fill="rgba(240,180,41,0.08)"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.5" fill="#f0b429"/>
  </g>

  <!-- XP text — bold, monospaced feel -->
  <text x="52" y="20" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="22" font-weight="800" letter-spacing="1" fill="url(#amber-glow)">XP</text>

  <!-- HUNT text — lighter, tracked out -->
  <text x="52" y="40" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="16" font-weight="400" letter-spacing="5" fill="#94a3b8">HUNT</text>

  <!-- Decorative flight path line -->
  <line x1="120" y1="24" x2="155" y2="24" stroke="url(#amber-fade)" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Subtitle -->
  <text x="160" y="20" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="8" letter-spacing="2" fill="#64748b" text-transform="uppercase">FLYING BLUE</text>
  <text x="160" y="34" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="8" letter-spacing="2" fill="#64748b" text-transform="uppercase">XP OPTIMIZER</text>
</svg>
