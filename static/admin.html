<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Hunt — Admin</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .admin-container { max-width: 960px; margin: 0 auto; padding: 24px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .admin-header h2 { font-size: 18px; color: var(--amber); }

    /* Login */
    .login-box { max-width: 360px; margin: 80px auto; }
    .login-box h2 { margin-bottom: 16px; color: var(--amber); font-size: 18px; }
    .login-box .field { margin-bottom: 12px; }
    .login-box input { width: 100%; }
    .login-box .btn { width: 100%; justify-content: center; margin-top: 8px; }
    .login-error { color: var(--red); font-size: 12px; margin-top: 8px; }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; text-align: center;
    }
    .stat-card .stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 700; color: var(--amber); }
    .stat-card .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-top: 4px; }

    /* Tables */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 24px; }
    .admin-table th, .admin-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .admin-table th { color: var(--text-dim); font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-mono); }
    .admin-table td { color: var(--text-secondary); font-family: var(--font-mono); }
    .admin-table tr:hover td { background: var(--bg-panel-hover); }

    /* Section headers */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .section-header h3 { font-size: 14px; color: var(--text); }

    /* Add user form */
    .add-user-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
    .add-user-form .field { flex: 1; min-width: 120px; }
    .add-user-form input, .add-user-form select { width: 100%; }

    .btn-danger { background: rgba(239, 68, 68, 0.15); color: var(--red); border-color: var(--red); font-size: 11px; padding: 4px 10px; }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
    .badge-admin { background: rgba(240, 180, 41, 0.15); color: var(--amber); padding: 1px 6px; border-radius: 8px; font-size: 10px; }
    .badge-user { background: rgba(96, 165, 250, 0.15); color: var(--blue); padding: 1px 6px; border-radius: 8px; font-size: 10px; }
    .ts { font-size: 11px; color: var(--text-dim); }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-box">
    <h2>Admin Login</h2>
    <div class="field">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" class="input-iata" style="width:100%" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" class="input-iata" style="width:100%">
    </div>
    <button id="login-btn" class="btn btn-primary">Login</button>
    <div id="login-error" class="login-error" hidden></div>
  </div>

  <!-- Admin Dashboard -->
  <div id="admin-dashboard" hidden>
    <header class="header">
      <div class="header-left">
        <h1 class="logo">XP Hunt</h1>
        <span class="subtitle">Admin Dashboard</span>
      </div>
      <div class="header-right">
        <span id="admin-name" style="color:var(--text-dim);font-size:12px;margin-right:8px"></span>
        <a href="/" class="btn btn-ghost">Back to App</a>
        <button id="logout-btn" class="btn btn-ghost">Logout</button>
      </div>
    </header>

    <div class="admin-container">
      <!-- Stats -->
      <div id="stats-grid" class="stat-grid"></div>

      <!-- Top Origins / Cabins -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
        <div>
          <div class="section-header"><h3>Top Origins</h3></div>
          <table class="admin-table" id="origins-table"><tbody></tbody></table>
        </div>
        <div>
          <div class="section-header"><h3>Cabin Breakdown</h3></div>
          <table class="admin-table" id="cabins-table"><tbody></tbody></table>
        </div>
      </div>

      <!-- Users -->
      <div class="section-header">
        <h3>Users</h3>
      </div>
      <div class="add-user-form">
        <div class="field"><label>Email</label><input id="new-email" class="input-iata" style="width:100%" placeholder="user@example.com"></div>
        <div class="field"><label>Name</label><input id="new-name" class="input-iata" style="width:100%" placeholder="Name"></div>
        <div class="field"><label>Password</label><input id="new-password" type="password" class="input-iata" style="width:100%"></div>
        <div class="field">
          <label>Role</label>
          <select id="new-role" class="input-select" style="width:100%">
            <option value="0">User</option>
            <option value="1">Admin</option>
          </select>
        </div>
        <button id="add-user-btn" class="btn btn-primary" style="height:38px">Add User</button>
      </div>
      <table class="admin-table" id="users-table">
        <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Created</th><th>Last Login</th><th></th></tr></thead>
        <tbody></tbody>
      </table>

      <!-- Recent Searches -->
      <div class="section-header"><h3>Recent Searches</h3></div>
      <table class="admin-table" id="searches-table">
        <thead><tr><th>Time</th><th>Origin</th><th>Trip</th><th>Cabin</th><th>Date</th><th>Groups</th><th>Results</th><th>Best $/XP</th><th>Duration</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let adminToken = localStorage.getItem('admin_token');
    let adminUser = null;

    const $ = s => document.querySelector(s);

    async function api(path, opts = {}) {
      const sep = path.includes('?') ? '&' : '?';
      const url = adminToken ? `${path}${sep}token=${adminToken}` : path;
      const resp = await fetch(url, opts);
      if (!resp.ok) {
        const msg = await resp.text();
        throw new Error(msg);
      }
      return resp.json();
    }

    // Login
    $('#login-btn').addEventListener('click', async () => {
      const email = $('#login-email').value;
      const pw = $('#login-password').value;
      try {
        const data = await api('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw }),
        });
        adminToken = data.token;
        adminUser = data.user;
        localStorage.setItem('admin_token', adminToken);
        showDashboard();
      } catch (e) {
        $('#login-error').textContent = 'Login failed: invalid credentials';
        $('#login-error').hidden = false;
      }
    });

    $('#login-password').addEventListener('keydown', e => { if (e.key === 'Enter') $('#login-btn').click(); });

    // Logout
    $('#logout-btn').addEventListener('click', () => {
      api('/api/admin/logout', { method: 'POST' }).catch(() => {});
      localStorage.removeItem('admin_token');
      adminToken = null;
      location.reload();
    });

    // Add user
    $('#add-user-btn').addEventListener('click', async () => {
      try {
        await api('/api/admin/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: $('#new-email').value,
            name: $('#new-name').value,
            password: $('#new-password').value,
            is_admin: $('#new-role').value === '1',
          }),
        });
        $('#new-email').value = '';
        $('#new-name').value = '';
        $('#new-password').value = '';
        loadUsers();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    });

    async function showDashboard() {
      $('#login-screen').hidden = true;
      $('#admin-dashboard').hidden = false;
      if (adminUser) $('#admin-name').textContent = adminUser.name;
      await Promise.all([loadStats(), loadUsers()]);
    }

    async function loadStats() {
      try {
        const stats = await api('/api/admin/stats');

        // Stat cards
        $('#stats-grid').innerHTML = [
          { v: stats.total_searches, l: 'Total Searches' },
          { v: stats.searches_today, l: 'Today' },
          { v: stats.avg_results, l: 'Avg Results' },
        ].map(s => `<div class="stat-card"><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');

        // Origins
        $('#origins-table tbody').innerHTML = stats.top_origins.map(
          r => `<tr><td>${r.origin}</td><td>${r.count}</td></tr>`
        ).join('') || '<tr><td colspan="2" style="color:var(--text-dim)">No data yet</td></tr>';

        // Cabins
        $('#cabins-table tbody').innerHTML = stats.top_cabins.map(
          r => `<tr><td>${r.cabin}</td><td>${r.count}</td></tr>`
        ).join('') || '<tr><td colspan="2" style="color:var(--text-dim)">No data yet</td></tr>';

        // Recent searches
        $('#searches-table tbody').innerHTML = stats.recent.map(r => {
          const ts = r.timestamp ? r.timestamp.replace('T', ' ').slice(0, 19) : '';
          return `<tr>
            <td class="ts">${ts}</td>
            <td>${r.origin}</td>
            <td>${r.trip_type}</td>
            <td>${r.cabin}</td>
            <td>${r.outbound_date}${r.return_date ? ' / ' + r.return_date : ''}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${r.groups || '-'}</td>
            <td>${r.results_found}</td>
            <td>${r.best_per_xp ? '$' + r.best_per_xp : '-'}</td>
            <td>${r.duration_ms ? (r.duration_ms / 1000).toFixed(1) + 's' : '-'}</td>
          </tr>`;
        }).join('') || '<tr><td colspan="9" style="color:var(--text-dim)">No searches yet</td></tr>';
      } catch (e) {
        // Session invalid
        localStorage.removeItem('admin_token');
        location.reload();
      }
    }

    async function loadUsers() {
      try {
        const users = await api('/api/admin/users');
        $('#users-table tbody').innerHTML = users.map(u => {
          const role = u.is_admin ? '<span class="badge-admin">admin</span>' : '<span class="badge-user">user</span>';
          const created = u.created_at ? u.created_at.replace('T', ' ').slice(0, 16) : '';
          const login = u.last_login ? u.last_login.replace('T', ' ').slice(0, 16) : 'never';
          return `<tr>
            <td>${u.email}</td>
            <td>${u.name}</td>
            <td>${role}</td>
            <td class="ts">${created}</td>
            <td class="ts">${login}</td>
            <td><button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button></td>
          </tr>`;
        }).join('');
      } catch (e) {}
    }

    window.deleteUser = async function(id) {
      if (!confirm('Delete this user?')) return;
      await api(`/api/admin/users/${id}`, { method: 'DELETE' });
      loadUsers();
    };

    // Auto-login if token exists
    if (adminToken) {
      api('/api/admin/stats').then(() => showDashboard()).catch(() => {
        localStorage.removeItem('admin_token');
        adminToken = null;
      });
    }
  </script>
</body>
</html>
