<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7d070"/>
      <stop offset="100%" stop-color="#d9a326"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>

  <!-- Targeting reticle -->
  <g transform="translate(16, 16)">
    <!-- Outer arcs -->
    <path d="M-11 0 A11 11 0 0 1 -7.78 -7.78" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M7.78 -7.78 A11 11 0 0 1 11 0" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M11 0 A11 11 0 0 1 7.78 7.78" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-7.78 7.78 A11 11 0 0 1 -11 0" stroke="#f0b429" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Crosshair ticks -->
    <line x1="-13" y1="0" x2="-10" y2="0" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="0" x2="13" y2="0" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-13" x2="0" y2="-10" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="0" y2="13" stroke="#f0b429" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- XP text -->
  <text x="16" y="19.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="900" letter-spacing="0.5" fill="url(#g)">XP</text>
</svg>
